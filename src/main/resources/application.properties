# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# PostgreSQL Database
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/sleepersync
spring.datasource.username=your_db_username
spring.datasource.password=your_db_password
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT
# =============================================
# Replace this secret with a long random string in production (min 32 chars)
jwt.secret=REDACTED_ROTATED_SECRET
# 24 hours in milliseconds
jwt.expiration-ms=86400000

# =============================================
# Sleeper API
# =============================================
sleeper.api.base-url=https://api.sleeper.app/v1
sleeper.api.sport=nba
sleeper.api.season=2025

# =============================================
# Jackson
# =============================================
spring.jackson.deserialization.fail-on-unknown-properties=false
