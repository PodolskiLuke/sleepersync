# =============================================
# Local secrets (optional, git-ignored)
# =============================================
# If src/main/resources/application-secrets.properties exists it is loaded here
# and its values (e.g. jwt.secret, spring.datasource.password) override the
# defaults below. That file is git-ignored so real secrets never get committed.
# In deployed environments prefer real environment variables instead.
spring.config.import=optional:classpath:application-secrets.properties

# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# PostgreSQL Database
# =============================================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/sleepersync}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT
# =============================================
# The signing secret MUST be provided via the JWT_SECRET environment variable
# in any shared/deployed environment. The fallback below is a clearly-marked
# local-development-only value and must never be used in production.
# HS256 requires at least 32 bytes (256 bits).
jwt.secret=${JWT_SECRET:local-dev-only-insecure-secret-change-me-0123456789}
# 24 hours in milliseconds
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# =============================================
# Sleeper API
# =============================================
sleeper.api.base-url=https://api.sleeper.app/v1
sleeper.api.sport=nba
# Current NBA season (Sleeper labels a season by its start year, e.g. the
# 2025-26 season is "2025"). Dynasty leagues get a NEW league_id each season
# once the commissioner rolls them over, so this should be bumped once the
# new league year starts. getLeaguesForUser() also queries season-1 as a
# safety net so leagues that haven't rolled over yet still show up.
sleeper.api.season=2026

# =============================================
# Jackson
# =============================================
spring.jackson.deserialization.fail-on-unknown-properties=false

# =============================================
# External Rankings Scraper
# =============================================
rankings.scraper.enabled=true
rankings.scraper.timeout-ms=8000
# Configure public pages that list next-season and dynasty rankings.
# Leave blank to disable scraping for that source.
rankings.scraper.next-season-url=https://hashtagbasketball.com/fantasy-basketball-projections
rankings.scraper.dynasty-url=https://www.fantasypros.com/nba/rankings/dynasty-overall.php
rankings.scraper.rookie-url=https://www.fantasypros.com/nba/rankings/rookies.php
rankings.scraper.rookie-url-alt=https://www.spotrac.com/nba/draft/
rankings.scraper.rookie-url-alt2=https://www.espn.com/nba/draft/bestavailable
rankings.scraper.rookie-class-year=2026
