# =============================================
# Server
# =============================================
server.port=8080

# =============================================
# PostgreSQL Database
# =============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/sleepersync
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# =============================================
# JPA / Hibernate
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# =============================================
# JWT
# =============================================
# Replace this secret with a long random string in production (min 32 chars)
jwt.secret=REDACTED_ROTATED_SECRET
# 24 hours in milliseconds
jwt.expiration-ms=86400000

# =============================================
# Sleeper API
# =============================================
sleeper.api.base-url=https://api.sleeper.app/v1
sleeper.api.sport=nba
# Current NBA season (Sleeper labels a season by its start year, e.g. the
# 2025-26 season is "2025"). Dynasty leagues get a NEW league_id each season
# once the commissioner rolls them over, so this should be bumped once the
# new league year starts. getLeaguesForUser() also queries season-1 as a
# safety net so leagues that haven't rolled over yet still show up.
sleeper.api.season=2026

# =============================================
# Jackson
# =============================================
spring.jackson.deserialization.fail-on-unknown-properties=false
